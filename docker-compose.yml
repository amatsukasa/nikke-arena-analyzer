version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nikke_arena_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nikke_arena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nikke_arena_backend
    ports:
      - "8000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/nikke_arena
    depends_on:
      - db
    command: npm start
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nikke_arena_frontend
    ports:
      - "3000:3000"
    # No volumes mapping to avoid overwriting production build inside container
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: npm start
    restart: unless-stopped

volumes:
  postgres_data:
    name: nikke-arena-analyzer_postgres_data
    external: true
