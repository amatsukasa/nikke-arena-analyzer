version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nikke_arena_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nikke_arena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nikke_arena_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/nikke_arena
      - SECRET_KEY=dev-secret-key-local-only
      - SITE_PASSWORD=test2026
      - INVITE_CODE=dev-invite
      - FIRST_ADMIN_EMAIL=admin@example.com
      - FIRST_ADMIN_PASSWORD=admin123
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nikke_arena_frontend
    ports:
      - "3000:3000"
    # No volumes mapping to avoid overwriting production build inside container
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://backend:8000
      - SITE_PASSWORD=test2026
    command: npm start
    restart: unless-stopped

volumes:
  postgres_data:
    name: nikke-arena-analyzer_postgres_data
    external: true
